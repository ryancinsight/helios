<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="sans-serif" font-size="12" role="img" aria-label="Differential DVH for the synthetic Gaussian dose phantom">
  <title>Differential DVH (Gaussian dose phantom)</title>
  <desc>Histogram-style DVH plot for the dvh_analysis.rs synthetic Gaussian phantom (peak=63 Gy, sigma=25 mm, 31^3 voxels). The curve is the analytical Gaussian dV/dD plot. Source: helios-analysis/examples/dvh_analysis.rs.</desc>
  <g stroke="#222" fill="none">
    <line x1="60" y1="280" x2="60" y2="40"/>
    <line x1="60" y1="280" x2="460" y2="280"/>
  </g>
  <text x="200" y="22" text-anchor="middle" font-size="13" font-weight="bold">Differential DVH &#8212; Gaussian dose phantom (peak 63 Gy)</text>
  <text x="260" y="305" text-anchor="middle" font-size="11" fill="#222">Dose (Gy)</text>
  <text x="20" y="160" text-anchor="middle" font-size="11" fill="#222" transform="rotate(-90 20 160)">dV/dD (voxels / Gy)</text>
  <!-- x = dose in Gy, mapped 0..70 over 60..460 (1 Gy ~ 5.71 px)
       peak ~ at 63 Gy -> x ~ 60+63*5.71=420 ; y ~ 280-235=45 (peak height ~ 235 px) -->
  <polyline stroke="#3b6fa0" stroke-width="2" fill="#cfe0f1" fill-opacity="0.6"
    points="60,280 80,278 100,275 120,270 140,260 160,245 180,220 200,185 220,140 240,90 260,55 280,40 300,38 320,42 340,55 360,80 380,115 400,170 420,235 440,275 460,280" />
  <g stroke="#234" stroke-dasharray="3 3" fill="none">
    <line x1="285" y1="40" x2="285" y2="280"/>
    <line x1="285" y1="280" x2="285" y2="293"/>
  </g>
  <text x="288" y="293" font-size="10" fill="#234">63 Gy peak</text>
  <g font-size="10" fill="#222" text-anchor="middle">
    <text x="60" y="294">0</text>
    <text x="160" y="294">18</text>
    <text x="260" y="294">36</text>
    <text x="360" y="294">54</text>
    <text x="440" y="294">65</text>
  </g>
  <text x="240" y="316" text-anchor="middle" font-size="10" fill="#555">source: helios-analysis/examples/dvh_analysis.rs  ·  D_mean &#8776; 14.0 Gy, V&#8329;&#8325; &#8776; 95% (PTV masked)</text>
</svg>
