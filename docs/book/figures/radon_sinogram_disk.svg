<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="sans-serif" font-size="12" role="img" aria-label="Radon sinogram single-angle profile (theta = 0) for a 30mm radius disk">
  <title>Radon sinogram profile at theta = 0</title>
  <desc>Plot of line integral vs detector offset for the disk phantom in helios-imaging/examples/radon_sinogram.rs. p(s) = mu0 * 2*sqrt(R^2 - s^2)/10. Disk radius 30 mm, mu0 = 0.2 cm^-1, detector offsets -50..+50 mm.</desc>
  <g stroke="#222" fill="none">
    <line x1="60" y1="280" x2="60" y2="40"/>
    <line x1="60" y1="280" x2="460" y2="280"/>
  </g>
  <text x="240" y="22" text-anchor="middle" font-size="13" font-weight="bold">Sinogram profile at &#952; = 0  (disk R = 30 mm, &#956;<tspan baseline-shift="sub" font-size="10">0</tspan> = 0.2 cm&#8315;&#185;)</text>
  <text x="20" y="170" text-anchor="middle" font-size="11" fill="#222" transform="rotate(-90 20 170)">line integral (mm)</text>
  <text x="240" y="305" text-anchor="middle" font-size="11" fill="#222">detector offset s (mm)</text>
  <!-- s range -50..+50 spans x=60..460; 1 mm = 4 px ; p(s) peak ~0.2*2*30/10 = 1.2 mm-cm^-1 ; y range 0..1.2 maps to px 280..40 -->
  <!-- semicircle pts: p(s) = 0.2*2*sqrt(900-s*s)/10 = 0.04*sqrt(900-s*s)
       polyline at s = -50, -47.5, ..., +50 ; 21 points ; plot 21 circles -->
  <polyline stroke="#3b6fa0" stroke-width="2" fill="none"
    points="60,280 80,278.4 100,272.0 120,261.6 140,247.2 160,228.0 180,202.4 200,167.2 220,108.0 240,40.0 260,108.0 280,167.2 300,202.4 320,228.0 340,247.2 360,261.6 380,272.0 400,278.4 420,280 460,280" />
  <g fill="#234">
    <circle cx="60" cy="280" r="3"/>
    <circle cx="120" cy="261.6" r="3"/>
    <circle cx="180" cy="202.4" r="3"/>
    <circle cx="240" cy="40.0" r="3"/>
    <circle cx="300" cy="202.4" r="3"/>
    <circle cx="360" cy="261.6" r="3"/>
    <circle cx="420" cy="280" r="3"/>
    <circle cx="460" cy="280" r="3"/>
  </g>
  <g font-size="10" fill="#222" text-anchor="middle">
    <text x="60" y="294">-50</text>
    <text x="160" y="294">-30</text>
    <text x="240" y="294">0</text>
    <text x="320" y="294">+30</text>
    <text x="420" y="294">+50</text>
  </g>
  <g font-size="10" fill="#222" text-anchor="end">
    <text x="56" y="284">0</text>
    <text x="56" y="100">1.2</text>
    <text x="56" y="180">0.8</text>
  </g>
  <g stroke="#bbb" stroke-dasharray="2 2">
    <line x1="60" y1="100" x2="460" y2="100"/>
    <line x1="60" y1="180" x2="460" y2="180"/>
  </g>
  <text x="244" y="20" text-anchor="middle" font-size="10" fill="#3b6fa0" font-weight="bold">peak p(0) = 1.2 mm&#183;cm&#8315;&#185;</text>
  <text x="240" y="316" text-anchor="middle" font-size="10" fill="#555">p(s) = &#956;<tspan baseline-shift="sub" font-size="10">0</tspan>&#183;2&#8730;(R&#178; - s&#178;)/10  ·  source: helios-imaging/examples/radon_sinogram.rs</text>
</svg>
