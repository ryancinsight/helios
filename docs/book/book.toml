[book]
title = "Helios Radiotherapy Simulation Guide"
authors = ["Ryan Clanton"]
description = "Comprehensive guide to the Helios radiation therapy simulation suite — CT imaging, dose calculation, treatment planning, and delivery verification powered by the Atlas physics stack."
language = "en"
src = "."

# Toolchain compatibility notes:
#   - `multilingual = false` was dropped from `[book]` because mdbook v0.5.4
#     rejects the field at the top of `[book]` ("unknown field 'multilingual' at
#     line 6 column 1"). Default single-language is preserved by omission.
#   - All other v0.5.4-supported fields (title, authors, description, language,
#     src, [build], [output.html.*]) are unchanged.

[build]
build-dir = "../../target/book/helios"
create-missing = false

[output.html]
# Math support: `mathjax-support = true` enables MathJax rendering for $...$ and
# $$...$$ blocks, matching kwavers/docs/book/book.toml convention.
mathjax-support = true
# `theme = "default"` was dropped: mdbook v0.5.4 treats it as an unknown
# field and looks for a `default/` directory under the book root, which
# is not present (CFDrs and kwavers do not declare a `theme` field either).
# The `default-theme = "light"` below already handles the primary theme;
# `preferred-dark-theme = "navy"` handles the dark variant.
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/ryancinsight/helios"
edit-url-template = "https://github.com/ryancinsight/helios/edit/main/docs/book/{path}"
