# Test-time budget (CLAUDE.md core invariant #12): a test is marked slow at 30 s
# and terminated at 60 s (two 30 s periods). Crossing 30 s is a performance defect
# to profile and optimize in the real code — never raise the limit or shrink the
# workload. A 60 s termination is a hang/deadlock to root-cause.
[profile.default]
slow-timeout = { period = "30s", terminate-after = 2, grace-period = "5s" }
global-timeout = "15m"

[profile.ci]
test-threads = 4
retries = 0
fail-fast = true
slow-timeout = { period = "30s", terminate-after = 2, grace-period = "10s" }
global-timeout = "15m"

# GPU tests each initialize a wgpu device; running several concurrently in
# separate nextest processes contends on the single physical device and crashes
# the driver (STATUS_ACCESS_VIOLATION 0xC0000005). Each test is correct in
# isolation — the fault is concurrent device access, not logic — so serialize
# every GPU-backed test through a single-slot group across all profiles.
[test-groups]
gpu = { max-threads = 1 }

[[profile.default.overrides]]
filter = "package(helios-gpu)"
test-group = "gpu"

[[profile.ci.overrides]]
filter = "package(helios-gpu)"
test-group = "gpu"
