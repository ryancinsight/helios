name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --locked --workspace --all-features

      - name: Documentation
        run: cargo doc --locked --workspace --no-deps

  benchmark-regression:
    name: benchmark regression check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-bench-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Criterion benchmarks
        run: cargo bench --locked --workspace --all-features

      - name: Save benchmark baseline
        run: |
          python3 .github/scripts/check_regressions.py save \
            --workspace . \
            --output .benchmarks/baseline.json

      - name: Check benchmark regressions
        run: |
          python3 .github/scripts/check_regressions.py check \
            --workspace . \
            --baseline .benchmarks/baseline.json \
            --threshold-pct 15
