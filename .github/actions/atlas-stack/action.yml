name: Materialize Atlas providers
description: Checkout the Atlas-pinned provider set required by local Cargo patches

runs:
  using: composite
  steps:
    - name: Checkout Atlas stack manifest
      uses: actions/checkout@v4
      with:
        repository: ryancinsight/atlas
        path: atlas-stack
        fetch-depth: 1

    - name: Materialize patched providers
      shell: bash
      run: |
        set -euo pipefail
        providers=(
          leto eunomia tyche gaia ritk consus coeus hephaestus
          mnemosyne moirai hermes themis melinoe
        )
        paths=()
        for provider in "${providers[@]}"; do
          paths+=("repos/${provider}")
        done
        git -C "${GITHUB_WORKSPACE}/atlas-stack" submodule update \
          --init --depth 1 -- "${paths[@]}"
        for provider in "${providers[@]}"; do
          ln -s \
            "${GITHUB_WORKSPACE}/atlas-stack/repos/${provider}" \
            "${GITHUB_WORKSPACE}/../${provider}"
        done
